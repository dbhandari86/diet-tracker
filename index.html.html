<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
    :root{
      --bg:#07131a;--bg-2:#0c1b24;--panel:#0f2029;--panel-2:#132631;--border:#21414d;--border-strong:#2d5665;
      --text:#edf6f7;--text-soft:#b8ccd1;--muted:#7e9aa3;--muted-2:#5c7882;--brand:#f59e0b;--brand-strong:#f97316;
      --brand-soft:#fff4df;--success:#4ade80;--warning:#fbbf24;--danger:#ef4444;--shadow:0 18px 40px rgba(0,0,0,.24);--radius:20px
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top,#163543 0%,rgba(22,53,67,.2) 22%,transparent 48%),linear-gradient(180deg,#07131a 0%,#091820 40%,#061116 100%);color:var(--text);font-family:'DM Sans',sans-serif}
    .app{min-height:100vh;padding-bottom:80px}.sticky{position:sticky;top:0;z-index:50;background:rgba(7,19,26,.84);backdrop-filter:blur(18px);border-bottom:1px solid rgba(45,86,101,.5);padding:14px 16px 0;box-shadow:0 10px 30px rgba(0,0,0,.18)}
    .container{max-width:560px;margin:0 auto}.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px}
    h1{font-family:'Playfair Display',serif;font-size:22px;margin:0;font-weight:700;letter-spacing:.2px}.sub{color:var(--muted);font-size:11px;margin-top:3px}
    .tabs{display:flex;overflow-x:auto;gap:8px;padding-bottom:10px}.tabs::-webkit-scrollbar{display:none}
    .tab{padding:9px 16px;border:1px solid transparent;border-radius:999px;background:rgba(19,38,49,.55);cursor:pointer;color:var(--muted);font-size:13px;white-space:nowrap;transition:all .18s ease}
    .tab:hover{border-color:rgba(245,158,11,.2);color:var(--text-soft)}.tab.active{color:#1d1303;font-weight:700;background:linear-gradient(135deg,#fbbf24,#f59e0b);box-shadow:0 10px 20px rgba(245,158,11,.22)}.content{padding:18px 16px}
    .card{background:linear-gradient(180deg,rgba(19,38,49,.96),rgba(15,32,41,.94));border:1px solid rgba(45,86,101,.45);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.sec{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}
    .btn{padding:10px 16px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:transform .18s ease,box-shadow .18s ease,background .18s ease,color .18s ease}.btn:hover,.tinybtn:hover,.tab:hover{transform:translateY(-1px)}
    .btn-blue{background:linear-gradient(135deg,var(--brand),var(--brand-strong));color:#1d1303;box-shadow:0 12px 24px rgba(249,115,22,.22)}.btn-secondary{background:rgba(12,27,36,.9);color:var(--text);border:1px solid rgba(45,86,101,.55)}.btn-ghost{background:transparent;color:var(--text-soft)}.btn-outline{background:rgba(19,38,49,.4);color:var(--brand-soft);border:1px solid rgba(245,158,11,.28)}
    .empty{text-align:center;padding:52px 20px}.empty .icon{font-size:50px;margin-bottom:14px}.empty .title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px}.muted{color:var(--muted);font-size:13px}
    .dash{background:radial-gradient(circle at top right,rgba(245,158,11,.2),transparent 34%),linear-gradient(155deg,#17313c 0%,#10232d 48%,#0b181f 100%);border:1px solid rgba(245,158,11,.2);border-radius:24px;padding:20px 18px;margin-bottom:16px;box-shadow:0 22px 44px rgba(0,0,0,.28)}.label-up{color:#f7d89a;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}
    .dash-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}.bigcount{font-family:'Playfair Display',serif;font-size:56px;line-height:1;font-weight:700}.countsub{font-size:13px;font-weight:600;margin-top:4px}.countsub2{color:var(--muted);font-size:12px;margin-top:4px}
    .streakbox{background:rgba(7,19,26,.55);border:1px solid rgba(245,158,11,.18);border-radius:16px;padding:10px 14px;text-align:center;min-width:88px}
    .mealpills{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.mealpill{border-radius:14px;padding:11px 7px;text-align:center;background:rgba(7,19,26,.46);border:1px solid rgba(45,86,101,.42)}.mealpill.done{background:linear-gradient(180deg,rgba(10,53,30,.95),rgba(9,35,21,.95));border-color:rgba(74,222,128,.32)}
    .mealpill .emoji{font-size:18px;margin-bottom:3px}.mealpill .name{font-size:10px;font-weight:700;line-height:1.2}.mealpill .tiny{font-size:9px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pending-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(45,86,101,.28)}.pending-row:last-child{border-bottom:none}.meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-row{border-radius:16px;background:rgba(8,19,25,.78);border:1px solid rgba(45,86,101,.45);padding:13px 14px}.meal-row.done{background:linear-gradient(135deg,#0e2a1b,#0b2115);border-color:rgba(74,222,128,.28)}
    .meal-head{display:flex;align-items:center;gap:10px}.meal-check{width:30px;height:30px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(126,154,163,.55);background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}
    .meal-row.done .meal-check{border-color:var(--success);background:var(--success);color:#072312}.meal-meta{flex:1;min-width:0}.meal-label{font-weight:700;font-size:14px}.meal-item{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.done-tag{color:#86efac;font-size:11px;font-weight:700;flex-shrink:0}
    input[type="text"],input[type="number"],input[type="date"],input[type="time"],textarea,select{width:100%;background:rgba(7,19,26,.86);border:1px solid rgba(45,86,101,.48);border-radius:12px;color:var(--text-soft);font-size:13px;padding:10px 12px;outline:none;font-family:inherit;transition:border-color .16s ease,box-shadow .16s ease}
    input[type="text"]:focus,input[type="number"]:focus,input[type="date"]:focus,input[type="time"]:focus,textarea:focus,select:focus{border-color:rgba(245,158,11,.55);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
    .meal-note{margin-top:8px;padding:7px 10px;font-size:12px;border-radius:10px}.row-flex{display:flex;gap:8px;flex-wrap:wrap}.drink-card{border-radius:16px;background:rgba(8,19,25,.78);border:1px solid rgba(45,86,101,.45);padding:12px 14px}
    .drink-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.drink-line{display:flex;align-items:center;gap:8px;background:rgba(7,19,26,.86);border-radius:12px;padding:8px 10px;margin-top:8px;border:1px solid rgba(45,86,101,.3)}
    .tinybtn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:10px;color:#f6d08c;font-size:12px;padding:6px 12px;cursor:pointer;font-weight:700}.dangerx{background:transparent;border:none;color:var(--muted-2);cursor:pointer;font-size:16px;padding:0 4px;font-weight:700}
    .pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}.week-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(45,86,101,.24)}.week-row:last-child{border-bottom:none}
    .heatgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.heatcell{text-align:center}.heatbox{height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px solid transparent}
    .legend{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.legend-item{display:flex;align-items:center;gap:4px}.legend-box{width:8px;height:8px;border-radius:2px}
    .planner-day{background:rgba(8,19,25,.78);border:1px solid rgba(45,86,101,.42);border-radius:16px;padding:14px;margin-bottom:10px}.planner-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;margin-bottom:12px}
    .planner-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.field-label{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;display:block}.plan-chip{background:rgba(7,19,26,.82);border:1px solid rgba(45,86,101,.38);border-radius:999px;padding:5px 10px;font-size:11px;color:var(--text-soft)}
    .hist-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(45,86,101,.24)}.hist-row:last-child{border-bottom:none}svg{width:100%;height:auto}.error{color:#fca5a5;font-size:12px;margin-top:6px}
    @media (max-width:480px){.planner-grid{grid-template-columns:1fr}.mealpills{grid-template-columns:repeat(2,1fr)}.topline{align-items:flex-start}.btn-outline{padding-inline:12px}}
  </style>
</head>
<body>
<div class="app"><div class="sticky"><div class="container"><div class="topline"><div><h1>Diet Tracker</h1><div class="sub" id="headerSub">No active plan</div></div><button class="btn btn-outline" id="newPlanTopBtn">+ New Plan</button></div><div class="tabs"><button class="tab active" data-tab="today">Today</button><button class="tab" data-tab="week">This Week</button><button class="tab" data-tab="plan">Diet Plan</button><button class="tab" data-tab="history">History</button><button class="tab" data-tab="sync">Sync</button></div></div></div><div class="content container"><div id="view"></div></div></div>
<script>
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],DAY_SHORT=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],DRINK_TYPES=["Tea","Coffee","Cold Coffee","Milkshake","Ice Tea","Whiskey","Gin","Vodka","Beer","Tequila"],DRINK_MEASUREMENTS=["1 cup","1 glass","30 ml","60 ml","90 ml"],STORAGE_KEY="diet-v3-html",SYNC_FILENAME="diet-tracker-data.json";
const MEAL_FIELD_META={breakfast:{label:"Breakfast",icon:"🥚",options:["Boiled Egg","Banana"]},lunch:{label:"Lunch",icon:"🍽️",options:["Aloo Paratha"]},evening:{label:"Evening",icon:"🍌",options:["Banana"]},dinner:{label:"Dinner",icon:"🍖",options:["Half Chicken","Veg Soup","Pulao / Biryani"]}};
const DEFAULT_PORTIONS={"Boiled Egg":"1 egg","Banana":"1 medium","Aloo Paratha":"1 medium","Half Chicken":"1 serving","Veg Soup":"300 ml","Pulao / Biryani":"1 serving"};
function getTodayIndex(){const d=new Date().getDay();return d===0?6:d-1}
function todayStr(){const d=new Date(),local=new Date(d.getTime()-d.getTimezoneOffset()*60000);return local.toISOString().slice(0,10)}
function nowTime(){return new Date().toTimeString().slice(0,5)}
function parseLocalDate(str){const[y,m,d]=String(str||todayStr()).split("-").map(Number);return new Date(y,m-1,d)}
function fmtDateISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`}
function addDays(dateStr,days){const d=parseLocalDate(dateStr);d.setDate(d.getDate()+days);return fmtDateISO(d)}
function diffDays(fromStr,toStr){return Math.round((parseLocalDate(toStr)-parseLocalDate(fromStr))/86400000)}
function planStartDate(plan){return plan?.startDate||plan?.weekStart||todayStr()}
function planDayDate(plan,idx){return addDays(planStartDate(plan),idx)}
function planDayOffset(plan,date=todayStr()){return diffDays(planStartDate(plan),date)}
function formatPlanDay(plan,idx){return new Date(`${planDayDate(plan,idx)}T00:00:00`).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}
function planDayTitle(plan,idx){return new Date(`${planDayDate(plan,idx)}T00:00:00`).toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"})}
function mealFieldOptions(planLike,field){const defaults=MEAL_FIELD_META[field].options,fromCounts=Object.keys(planLike?.mealOptions?.[field]||{}),fromDays=(planLike?.dayPlans||[]).map(dp=>dp[field]).filter(Boolean);return [...new Set([...defaults,...fromCounts,...fromDays])]}
function mealOptionTotals(dayPlans,planLike){const totals={};for(const field of Object.keys(MEAL_FIELD_META)){totals[field]=Object.fromEntries(mealFieldOptions(planLike,field).map(opt=>[opt,0]));for(const dp of dayPlans){if(dp[field])totals[field][dp[field]]=(totals[field][dp[field]]||0)+1}}return totals}
function normalizeMealOptions(dayPlans,mealOptions,planLike){const base=mealOptionTotals(dayPlans,{mealOptions,dayPlans,...planLike});for(const field of Object.keys(base)){base[field]={...base[field],...(mealOptions?.[field]||{})}}return base}
function hydratePlan(plan){const seed=defaultPlan(),source=plan||seed,dayPlans=(source.dayPlans||seed.dayPlans).map((dp,i)=>({...seed.dayPlans[i],...dp})),days=(source.days||seed.days).map((d,i)=>({...seed.days[i],...d,drinks:(d?.drinks||[]).filter(drink=>drink&&(drink.type||drink.amount||drink.time)).map(drink=>({type:drink.type||"Tea",amount:drink.amount||"1 cup",time:drink.time||nowTime()}))}));return {...seed,...source,startDate:source.startDate||source.weekStart||todayStr(),weekStart:source.weekStart||source.startDate||todayStr(),dayPlans,days,mealOptions:normalizeMealOptions(dayPlans,source.mealOptions,source)}}
function hydrateStore(store){return {...store,plans:(store.plans||[]).map(hydratePlan),activePlanId:store.activePlanId,history:store.history||[]}}
function alignActivePlanToToday(store){if(!store?.plans?.length)return store;const activeId=store.activePlanId||store.plans[0]?.id;return {...store,plans:store.plans.map(plan=>plan.id===activeId?{...plan,startDate:todayStr()}:plan),activePlanId:activeId}}
function defaultDayMeals(){return{breakfast:"",breakfastPortion:"",lunch:"",lunchPortion:"",evening:"",eveningPortion:"",dinner:"",dinnerPortion:""}}
function defaultMealOptions(){return{breakfast:{"Boiled Egg":6,Banana:1},lunch:{"Aloo Paratha":7},evening:{Banana:7},dinner:{"Half Chicken":2,"Veg Soup":3,"Pulao / Biryani":2}}}
function defaultPlan(){const dayPlans=DAYS.map(()=>defaultDayMeals());return{id:Date.now(),weekStart:todayStr(),startDate:todayStr(),weight:"",mealOptions:defaultMealOptions(),dayPlans,days:DAYS.map(name=>({name,breakfast:false,breakfastNote:"",lunch:false,lunchNote:"",evening:false,eveningNote:"",dinnerDone:false,dinnerNote:"",drinks:[]}))}}
function calcStreak(days,uptoIndex){const ti=Math.min(days.length-1,Math.max(0,uptoIndex??getTodayIndex()));let s=0;for(let i=ti;i>=0;i--){const d=days[i];if(d.breakfast&&d.lunch&&d.evening&&d.dinnerDone)s++;else break}return s}
function loadStorage(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}catch{return{}}}
function saveStorage(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function syncConfig(){return state.store.sync||{gistId:"",token:"",autoSync:false,lastSyncedAt:""}}
function syncStorePatch(patch){updateStore({sync:{...syncConfig(),...patch}})}
function exportSyncData(){const{sync,...rest}=state.store;return{version:1,exportedAt:new Date().toISOString(),data:rest}}
function importSyncData(payload){if(!payload?.data)return false;const merged=hydrateStore({...payload.data,sync:state.store.sync||syncConfig()});state.store=merged;state.activePlanId=merged.activePlanId||merged.plans?.[0]?.id||null;saveStorage(state.store);render();return true}
function setSyncMessage(message,tone=""){state.syncMessage=message;state.syncTone=tone}
async function fetchGistFile(){const cfg=syncConfig();if(!cfg.gistId||!cfg.token)throw new Error("Add your Gist ID and GitHub token first.");const res=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{headers:{Authorization:`Bearer ${cfg.token}`,"Accept":"application/vnd.github+json"}});if(!res.ok)throw new Error(`GitHub request failed (${res.status}).`);const gist=await res.json(),file=gist.files?.[SYNC_FILENAME];if(!file?.content)throw new Error(`Couldn't find ${SYNC_FILENAME} in that Gist.`);return JSON.parse(file.content)}
async function pushCloudData(){const cfg=syncConfig();if(!cfg.gistId||!cfg.token)throw new Error("Add your Gist ID and GitHub token first.");const payload=JSON.stringify(exportSyncData(),null,2);const res=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{method:"PATCH",headers:{Authorization:`Bearer ${cfg.token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({files:{[SYNC_FILENAME]:{content:payload}}})});if(!res.ok)throw new Error(`Cloud sync failed (${res.status}).`);syncStorePatch({lastSyncedAt:new Date().toISOString()})}
let autoSyncTimer=null;
function scheduleAutoSync(){const cfg=syncConfig();if(!cfg.autoSync||!cfg.gistId||!cfg.token||state.syncBusy)return;if(autoSyncTimer)clearTimeout(autoSyncTimer);autoSyncTimer=setTimeout(async()=>{try{state.syncBusy=true;await pushCloudData();setSyncMessage("Auto-synced to cloud.","ok")}catch(e){setSyncMessage(e.message||"Auto-sync failed.","error")}finally{state.syncBusy=false;render()}},700)}
function parseDietText(text){const plan=defaultPlan(),lower=text.toLowerCase();if(/boiled egg/.test(lower)){plan.mealOptions.breakfast["Boiled Egg"]=7}if(/banana.*tue|on tue|tuesday/.test(lower)){plan.mealOptions.breakfast["Boiled Egg"]=6;plan.mealOptions.breakfast["Banana"]=1}if(/aloo paratha/.test(lower)){plan.mealOptions.lunch["Aloo Paratha"]=7}if(/evening\s*:\s*banana|banana.*all days/.test(lower)||/banana/.test(lower)){plan.mealOptions.evening["Banana"]=7}const soupMatch=lower.match(/(\d+)\s*days?\s*veg soup/),chickenMatch=lower.match(/(\d+)\s*days?\s*half chicken/),biryaniMatch=lower.match(/(\d+)\s*days?\s*(pulao|biryani|pulao\/biryani)/);const chickenDays=chickenMatch?parseInt(chickenMatch[1],10):0,soupDays=soupMatch?parseInt(soupMatch[1],10):0,biryaniDays=biryaniMatch?parseInt(biryaniMatch[1],10):0;plan.mealOptions.dinner["Half Chicken"]=chickenDays;plan.mealOptions.dinner["Veg Soup"]=soupDays;plan.mealOptions.dinner["Pulao / Biryani"]=biryaniDays;plan.dayPlans=DAYS.map(()=>defaultDayMeals());return plan}
let state={tab:"today",store:{},activePlanId:null,showPaste:false,pasteText:"",parseErr:"",editingPlan:null,syncMessage:"",syncBusy:false,syncTone:""};
function plans(){return (state.store.plans||[]).map(hydratePlan)} function history(){return state.store.history||[]} function activePlan(){return plans().find(p=>p.id===state.activePlanId)||null}
function updateStore(patch){state.store=hydrateStore({...state.store,...patch});saveStorage(state.store);scheduleAutoSync()} function upsertPlan(plan){const nextPlan=hydratePlan(plan),list=plans(),idx=list.findIndex(p=>p.id===nextPlan.id),np=idx>-1?list.map(p=>p.id===nextPlan.id?nextPlan:p):[nextPlan,...list];updateStore({plans:np,activePlanId:nextPlan.id});state.activePlanId=nextPlan.id}
function updateDay(di,patch){const plan=activePlan();if(!plan)return;upsertPlan({...plan,days:plan.days.map((d,i)=>i===di?{...d,...patch}:d)})}
function startNewWeek(){const plan=activePlan();if(plan)updateStore({history:[{weekStart:plan.startDate||plan.weekStart,weight:plan.weight,streak:calcStreak(plan.days,Math.min(6,Math.max(0,planDayOffset(plan)))),days:JSON.parse(JSON.stringify(plan.days)),dayPlans:JSON.parse(JSON.stringify(plan.dayPlans))},...history()]});const p=defaultPlan();if(plan){p.dayPlans=JSON.parse(JSON.stringify(plan.dayPlans));p.mealOptions=normalizeMealOptions(p.dayPlans,plan.mealOptions);p.startDate=todayStr()}upsertPlan(p);state.tab="today";render()}
function init(){const s=alignActivePlanToToday(hydrateStore(loadStorage()));state.store=s;if(s.activePlanId)state.activePlanId=s.activePlanId;else if(s.plans?.length)state.activePlanId=s.plans[0].id;saveStorage(state.store);render()}
function setTab(tab){state.tab=tab;render()}
function render(){const plan=activePlan(),offset=plan?planDayOffset(plan):null;document.getElementById("headerSub").textContent=!plan?"No active plan":offset<0?`Starts ${new Date(`${planStartDate(plan)}T00:00:00`).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}`:`Started ${new Date(`${planStartDate(plan)}T00:00:00`).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}`;document.querySelectorAll(".tab").forEach(btn=>{btn.classList.toggle("active",btn.dataset.tab===state.tab);btn.onclick=()=>setTab(btn.dataset.tab)});document.getElementById("newPlanTopBtn").onclick=()=>{state.tab="plan";state.showPaste=true;render()};const view=document.getElementById("view");if(state.tab==="today")view.innerHTML=renderToday();if(state.tab==="week")view.innerHTML=renderWeek();if(state.tab==="plan")view.innerHTML=renderPlan();if(state.tab==="history")view.innerHTML=renderHistory();if(state.tab==="sync")view.innerHTML=renderSync();bindViewEvents()}

function renderWeek(){const plan=activePlan();if(!plan)return `<div class="card" style="text-align:center;padding:30px"><div class="muted">No active plan yet.</div></div>`;const offset=planDayOffset(plan);return `<div class="card"><div class="sec">Daily heatmap</div><div class="heatgrid">${plan.days.map((d,i)=>{const n=[d.breakfast,d.lunch,d.evening,d.dinnerDone].filter(Boolean).length,bg=i>offset?"rgba(7,19,26,.7)":n===4?"#166534":n===3?"#3f6212":n===2?"#b45309":n===1?"#991b1b":"#17323d";return `<div class="heatcell"><div style="color:#7e9aa3;font-size:10px;margin-bottom:4px;font-weight:600">${new Date(`${planDayDate(plan,i)}T00:00:00`).toLocaleDateString("en-IN",{weekday:"short"})}</div><div class="heatbox" style="background:${bg};border-color:${i===offset?'#f59e0b':'transparent'}"><span style="color:rgba(255,255,255,0.5);font-size:10px">${i<=offset&&offset>=0?`${n}/4`:''}</span></div></div>`}).join("")}</div><div class="legend">${[["#166534","All 4"],["#3f6212","3"],["#b45309","2"],["#991b1b","1"],["#17323d","0"]].map(([c,l])=>`<div class="legend-item"><div class="legend-box" style="background:${c}"></div><span style="color:#7e9aa3;font-size:10px">${l} meals</span></div>`).join("")}</div></div><div class="card"><div class="sec">Day by day</div>${plan.days.map((day,i)=>{const dp=plan.dayPlans[i],meals=[{l:"BF",d:day.breakfast,item:dp.breakfast},{l:"Lu",d:day.lunch,item:dp.lunch},{l:"Ev",d:day.evening,item:dp.evening},{l:"Di",d:day.dinnerDone,item:dp.dinner}],cnt=meals.filter(m=>m.d).length,future=i>offset;return `<div class="week-row" style="opacity:${future?0.4:1}"><div style="width:88px;flex-shrink:0"><div style="color:#edf6f7;font-size:13px;font-weight:700">${new Date(`${planDayDate(plan,i)}T00:00:00`).toLocaleDateString("en-IN",{weekday:"short"})}</div><div style="color:#7e9aa3;font-size:11px">${new Date(`${planDayDate(plan,i)}T00:00:00`).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</div>${i===offset?`<span class="pill" style="background:rgba(245 function historyDetailHtml(entry){if(!entry?.days?.length)return"";const maxIndex=typeof entry.visibleThrough==="number"?Math.min(entry.visibleThrough,entry.days.length-1):entry.days.length-1;const detailDays=entry.days.map((day,i)=>{if(i>maxIndex)return"";const dp=entry.dayPlans?.[i]||{},notes=[["Breakfast",dp.breakfast,day.breakfastNote],["Lunch",dp.lunch,day.lunchNote],["Evening",dp.evening,day.eveningNote],["Dinner",dp.dinner,day.dinnerNote]].filter(([,meal,note])=>meal&&note),drinks=(day.drinks||[]).filter(d=>d&&(d.type||d.amount||d.time));if(!notes.length&&!drinks.length)return"";const label=new Date(`${addDays(entry.weekStart||todayStr(),i)}T00:00:00`).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});return `<div style="padding:10px 0;border-top:1px solid rgba(45,86,101,.2)"><div style="color:#edf6f7;font-size:12px;font-weight:700;margin-bottom:8px">${label}</div>${notes.map(([title,meal,note])=>`<div style="color:#b8ccd1;font-size:12px;margin-bottom:6px"><span style="color:#f6d08c;font-weight:700">${title}:</span> ${esc(meal)}${note?` <span style="color:#7e9aa3">- ${esc(note)}</span>`:''}</div>`).join("")}${drinks.length?`<div style="color:#b8ccd1;font-size:12px"><span style="color:#f6d08c;font-weight:700">Drinks:</span> ${drinks.map(d=>`${esc(d.type||"Drink")} ${esc(d.amount||"")} at ${esc(d.time||"--:--")}`).join(", ")}</div>`:''}</div>`}).filter(Boolean).join("");return detailDays?`<div style="margin-top:10px">${detailDays}</div>`:""}
function weightChartSvg(hist){const pts=hist.map(h=>parseFloat(h.weight)).filter(w=>!isNaN(w)&&w>0);if(pts.length<2)return `<div style="color:#7e9aa3;font-size:12px;text-align:center;padding:20px 0">Log weight for 2+ weeks to see trend</div>`;const min=Math.min(...pts)-0.5,max=Math.max(...pts)+0.5,W=300,H=90,px=16,x=i=>px+(i/(pts.length-1))*(W-px*2),y=v=>H-px-((v-min)/(max-min))*(H-px*2),pathD=pts.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' '),areaD=pathD+` L${x(pts.length-1)},${H} L${x(0)},${H} Z`;return `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="wg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.32"></stop><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"></stop></linearGradient></defs><path d="${areaD}" fill="url(#wg2)"></path><path d="${pathD}" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>${pts.map((v,i)=>`<g><circle cx="${x(i)}" cy="${y(v)}" r="3.2" fill="#f59e0b"></circle><text x="${x(i)}" y="${y(v)-7}" text-anchor="middle" fill="#b8ccd1" font-size="8" font-family="inherit">${v}</text></g>`).join("")}${hist.map((h,i)=>`<text x="${x(i)}" y="${H-1}" text-anchor="middle" fill="#7e9aa3" font-size="7" font-family="inherit">${esc((h.weekStart||"").slice(5)||`W${i+1}`)}</text>`).join("")}</svg>`}
function renderHistory(){const plan=activePlan(),hist=[...(plan?[{weekStart:plan.startDate||plan.weekStart,weight:plan.weight,streak:calcStreak(plan.days,Math.min(6,Math.max(0,planDayOffset(plan)))),days:plan.days,dayPlans:plan.dayPlans,visibleThrough:Math.min(6,Math.max(0,planDayOffset(plan))),current:true}]:[]),...history()];return `<div class="card"><div class="sec">Weight trend</div>${weightChartSvg([...history(),...(plan?[{weekStart:plan.startDate||plan.weekStart,weight:plan.weight}]:[])].filter(Boolean))}</div><div class="card"><div class="sec">Past weeks</div>${hist.length?hist.map(h=>`<div style="padding:2px 0 10px;border-bottom:1px solid rgba(45,86,101,.24)"><div class="hist-row" style="padding-top:0;padding-bottom:0;border-bottom:none"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span style="color:#edf6f7;font-size:13px;font-weight:700">${esc(h.weekStart)}</span>${h.current?`<span class="pill" style="background:rgba(245,158,11,.16);color:#fbbf24">current</span>`:''}</div><div style="color:#7e9aa3;font-size:11px;margin-top:2px">${h.weight?`${esc(h.weight)} kg`:'no weight logged'}</div></div><div style="text-align:right">${(h.streak??0)>0?`<div style="color:#fdba74;font-weight:700;font-size:13px">${Array.from({length:Math.min(h.streak,4)}).map(()=>`🔥`).join("")} ${h.streak}d streak</div>`:`<div style="color:#7e9aa3;font-size:12px">no full-day streak</div>`}</div></div>${historyDetailHtml(h)}</div>`).join(""):`<div style="color:#7e9aa3;font-size:13px;padding:20px 0;text-align:center">No history yet. Complete a week to see it here.</div>`}</div>`}
function renderSync(){const cfg=syncConfig(),last=cfg.lastSyncedAt?new Date(cfg.lastSyncedAt).toLocaleString("en-IN"):"Never",msg=state.syncMessage?`<div class="card" style="padding:12px;border-color:${state.syncTone==="error"?"rgba(239,68,68,.35)":"rgba(74,222,128,.25)"}"><div style="color:${state.syncTone==="error"?"#fca5a5":"#86efac"};font-size:12px">${esc(state.syncMessage)}</div></div>`:"";return `<div class="card"><div class="sec">Cloud Sync</div><div class="muted" style="margin-bottom:14px">Use one GitHub Gist as your shared data file across phone, home computer, and work computer.</div><div class="planner-grid"><div><span class="field-label">Gist ID</span><input id="syncGistId" type="text" value="${esc(cfg.gistId||"")}" placeholder="Paste your Gist ID"></div><div><span class="field-label">GitHub Token</span><input id="syncToken" type="text" value="${esc(cfg.token||"")}" placeholder="Paste a token with gist access"></div></div><div class="row-flex" style="margin-top:10px;align-items:center"><label style="display:flex;align-items:center;gap:8px;color:#b8ccd1;font-size:12px"><input id="syncAuto" type="checkbox" ${cfg.autoSync?"checked":""}> Auto-sync after changes</label><span style="color:#7e9aa3;font-size:12px">Last sync: ${esc(last)}</span></div><div class="row-flex" style="margin-top:14px"><button class="btn btn-blue" id="saveSyncSettingsBtn">${state.syncBusy?"Working...":"Save Sync Settings"}</button><button class="btn btn-secondary" id="pushSyncBtn">Push Local Data</button><button class="btn btn-secondary" id="pullSyncBtn">Pull Cloud Data</button></div></div>${msg}<div class="card"><div class="sec">Setup</div><div class="muted">1. Create a GitHub Gist with a file named <code>${SYNC_FILENAME}</code>.</div><div class="muted">2. Create a GitHub token with <code>gist</code> access.</div><div class="muted">3. Paste both here on each device, then use Push once and Pull on your other devices.</div></div>`}
function bindViewEvents(){const plan=activePlan();const addDietBtn=document.getElementById("addDietBtn");if(addDietBtn)addDietBtn.onclick=()=>{state.tab="plan";state.showPaste=true;render()};document.querySelectorAll('[data-action="toggle-meal"]').forEach(btn=>{btn.onclick=()=>{const idx=parseInt(btn.dataset.index,10),field=btn.dataset.field,p=activePlan();updateDay(idx,{[field]:!p.days[idx][field]});render()}});document.querySelectorAll('[data-action="note-meal"]').forEach(inp=>{inp.oninput=()=>{const idx=parseInt(inp.dataset.index,10),field=inp.dataset.field;updateDay(idx,{[field]:inp.value})}});document.querySelectorAll('[data-action="add-drink"]').forEach(btn=>{btn.onclick=()=>{const idx=parseInt(btn.dataset.index,10),p=activePlan(),drinks=[...(p.days[idx].drinks||[]),{type:"Tea",amount:"1 cup",time:nowTime()}];updateDay(idx,{drinks});render()}});document.querySelectorAll('[data-action="drink-type"]').forEach(sel=>{sel.onchange=()=>{const di=parseInt(sel.dataset.day,10),dr=parseInt(sel.dataset.drink,10),p=activePlan(),drinks=[...(p.days[di].drinks||[])];drinks[dr]={...drinks[dr],type:sel.value};updateDay(di,{drinks})}});document.querySelectorAll('[data-action="drink-amount"]').forEach(sel=>{sel.onchange=()=>{const di=parseInt(sel.dataset.day,10),dr=parseInt(sel.dataset.drink,10),p=activePlan(),drinks=[...(p.days[di].drinks||[])];drinks[dr]={...drinks[dr],amount:sel.value};updateDay(di,{drinks})}});document.querySelectorAll('[data-action="drink-time"]').forEach(inp=>{inp.onchange=()=>{const di=parseInt(inp.dataset.day,10),dr=parseInt(inp.dataset.drink,10),p=activePlan(),drinks=[...(p.days[di].drinks||[])];drinks[dr]={...drinks[dr],time:inp.value};updateDay(di,{drinks})}});document.querySelectorAll('[data-action="del-drink"]').forEach(btn=>{btn.onclick=()=>{const di=parseInt(btn.dataset.day,10),dr=parseInt(btn.dataset.drink,10),p=activePlan(),drinks=(p.days[di].drinks||[]).filter((_,i)=>i!==dr);updateDay(di,{drinks});render()}});const saveWeightBtn=document.getElementById("saveWeightBtn");if(saveWeightBtn&&plan)saveWeightBtn.onclick=()=>{const v=document.getElementById("weightInput").value.trim();if(v){upsertPlan({...plan,weight:v});render()}};const startNewWeekBtn=document.getElementById("startNewWeekBtn");if(startNewWeekBtn)startNewWeekBtn.onclick=()=>startNewWeek();const resetLogsBtn=document.getElementById("resetLogsBtn");if(resetLogsBtn&&plan)resetLogsBtn.onclick=()=>{if(confirm("Reset this week's meal logs? Plan stays.")){upsertPlan({...plan,days:defaultPlan().days});render()}};const showPasteBtn=document.getElementById("showPasteBtn");if(showPasteBtn)showPasteBtn.onclick=()=>{state.showPaste=true;state.parseErr="";render()};const cancelPasteBtn=document.getElementById("cancelPasteBtn");if(cancelPasteBtn)cancelPasteBtn.onclick=()=>{state.showPaste=false;state.pasteText="";state.parseErr="";render()};const parseFillBtn=document.getElementById("parseFillBtn");if(parseFillBtn)parseFillBtn.onclick=()=>{const txt=document.getElementById("pasteDietText").value.trim();state.pasteText=txt;if(!txt){state.parseErr="Please paste some diet text.";render();return}try{const p=hydratePlan(parseDietText(txt));p.startDate=plan?.startDate||todayStr();state.editingPlan=p;state.showPaste=false;state.parseErr="";render()}catch(e){state.parseErr="Couldn't parse automatically. Fill the grid manually below.";render()}};const fillManualBtn=document.getElementById("fillManualBtn");if(fillManualBtn)fillManualBtn.onclick=()=>{const p=defaultPlan();if(plan){p.dayPlans=JSON.parse(JSON.stringify(plan.dayPlans));p.mealOptions=normalizeMealOptions(p.dayPlans,plan.mealOptions,plan);p.startDate=plan.startDate||todayStr()}state.editingPlan=hydratePlan(p);render()};const editPlanBtn=document.getElementById("editPlanBtn");if(editPlanBtn&&plan)editPlanBtn.onclick=()=>{state.editingPlan=hydratePlan(JSON.parse(JSON.stringify(plan)));render()};const planStartDateInput=document.getElementById("planStartDateInput");if(planStartDateInput&&state.editingPlan)planStartDateInput.onchange=()=>{state.editingPlan.startDate=planStartDateInput.value||todayStr();render()};document.querySelectorAll('[data-action="edit-meal-count"]').forEach(inp=>{inp.oninput=()=>{const field=inp.dataset.field,opt=inp.dataset.option;if(!state.editingPlan.mealOptions[field])state.editingPlan.mealOptions[field]={};state.editingPlan.mealOptions[field][opt]=Math.max(0,parseInt(inp.value||"0",10)||0);render()}});document.querySelectorAll('[data-action="add-meal-option"]').forEach(btn=>{btn.onclick=()=>{const field=btn.dataset.field,input=document.querySelector(`[data-action="new-meal-option"][data-field="${field}"]`),value=input?.value.trim();if(!value)return;if(!state.editingPlan.mealOptions[field])state.editingPlan.mealOptions[field]={};if(!(value in state.editingPlan.mealOptions[field]))state.editingPlan.mealOptions[field][value]=0;if(!(value in DEFAULT_PORTIONS))DEFAULT_PORTIONS[value]="";input.value="";render()}});document.querySelectorAll('[data-action="remove-meal-option"]').forEach(btn=>{btn.onclick=()=>{const field=btn.dataset.field,opt=btn.dataset.option;const inUse=state.editingPlan.dayPlans.some(dp=>dp[field]===opt);if(inUse){alert('Remove this option from assigned days first.');return}delete state.editingPlan.mealOptions[field][opt];render()}});document.querySelectorAll('[data-action="edit-field"]').forEach(inp=>{const handler=()=>{const di=parseInt(inp.dataset.day,10),field=inp.dataset.field;state.editingPlan.dayPlans[di][field]=inp.value;if(inp.tagName==="SELECT"&&inp.dataset.portion){state.editingPlan.dayPlans[di][`${field}Portion`]=DEFAULT_PORTIONS[inp.value]||state.editingPlan.dayPlans[di][`${field}Portion`]||"";render()}};inp.oninput=handler;inp.onchange=handler});const savePlanBtn=document.getElementById("savePlanBtn");if(savePlanBtn)savePlanBtn.onclick=()=>{state.editingPlan=hydratePlan(state.editingPlan);upsertPlan(state.editingPlan);state.editingPlan=null;state.tab="today";render()};const cancelEditPlanBtn=document.getElementById("cancelEditPlanBtn");if(cancelEditPlanBtn)cancelEditPlanBtn.onclick=()=>{state.editingPlan=null;render()};const saveSyncSettingsBtn=document.getElementById("saveSyncSettingsBtn");if(saveSyncSettingsBtn)saveSyncSettingsBtn.onclick=()=>{syncStorePatch({gistId:document.getElementById("syncGistId").value.trim(),token:document.getElementById("syncToken").value.trim(),autoSync:document.getElementById("syncAuto").checked});setSyncMessage("Sync settings saved locally.","ok");render()};const pushSyncBtn=document.getElementById("pushSyncBtn");if(pushSyncBtn)pushSyncBtn.onclick=async()=>{try{state.syncBusy=true;setSyncMessage("Pushing local data to cloud...","ok");render();syncStorePatch({gistId:document.getElementById("syncGistId").value.trim(),token:document.getElementById("syncToken").value.trim(),autoSync:document.getElementById("syncAuto").checked});await pushCloudData();setSyncMessage("Local data pushed to cloud.","ok")}catch(e){setSyncMessage(e.message||"Push failed.","error")}finally{state.syncBusy=false;render()}};const pullSyncBtn=document.getElementById("pullSyncBtn");if(pullSyncBtn)pullSyncBtn.onclick=async()=>{try{state.syncBusy=true;setSyncMessage("Pulling cloud data...","ok");render();syncStorePatch({gistId:document.getElementById("syncGistId").value.trim(),token:document.getElementById("syncToken").value.trim(),autoSync:document.getElementById("syncAuto").checked});const payload=await fetchGistFile();if(!importSyncData(payload))throw new Error("Cloud data format was invalid.");syncStorePatch({lastSyncedAt:new Date().toISOString()});setSyncMessage("Cloud data pulled successfully.","ok")}catch(e){setSyncMessage(e.message||"Pull failed.","error")}finally{state.syncBusy=false;render()}};document.querySelectorAll(".activate-plan-btn").forEach(btn=>{btn.onclick=()=>{state.activePlanId=Number(btn.dataset.plan);updateStore({activePlanId:state.activePlanId});state.tab="today";render()}})}
init();
</script>
